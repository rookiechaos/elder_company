<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5e6e8">
  <title>オフライン - Elder Company</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(135deg, #faf9f7 0%, #f5e6e8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #4a4a4a;
    }

    .offline-container {
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
      background: linear-gradient(135deg, #f5e6e8 0%, #e8b4b8 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      box-shadow: 0 8px 24px rgba(232, 180, 184, 0.3);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 400;
      margin-bottom: 1rem;
      color: #4a4a4a;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #7a7a7a;
      margin-bottom: 2rem;
    }

    .retry-button {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, #f5e6e8 0%, #e8b4b8 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .retry-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(232, 180, 184, 0.4);
    }

    .retry-button:active {
      transform: translateY(0);
    }

    .tips {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(0, 0, 0, 0.1);
      text-align: left;
    }

    .tips h2 {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 1rem;
      color: #4a4a4a;
    }

    .tips ul {
      list-style: none;
      padding: 0;
    }

    .tips li {
      font-size: 0.9rem;
      color: #7a7a7a;
      margin-bottom: 0.5rem;
      padding-left: 1.5rem;
      position: relative;
    }

    .tips li:before {
      content: "•";
      position: absolute;
      left: 0;
      color: #e8b4b8;
    }

    @media (max-width: 480px) {
      .offline-icon {
        width: 100px;
        height: 100px;
        font-size: 40px;
      }

      h1 {
        font-size: 1.5rem;
      }

      p {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>オフライン</h1>
    <p>インターネット接続を確認してください。<br>接続が復旧すると、自動的に再読み込みされます。</p>
    <button class="retry-button" onclick="window.location.reload()">再試行</button>
    
    <div class="tips">
      <h2>確認事項：</h2>
      <ul>
        <li>Wi-Fiまたはモバイルデータが有効になっているか確認</li>
        <li>機内モードがオフになっているか確認</li>
        <li>ネットワーク設定を確認</li>
      </ul>
    </div>
  </div>

  <script>
    // Auto-retry when back online
    window.addEventListener('online', () => {
      window.location.reload()
    })

    // Check connection status periodically
    setInterval(() => {
      if (navigator.onLine) {
        window.location.reload()
      }
    }, 3000) // Check every 3 seconds
  </script>
</body>
</html>
